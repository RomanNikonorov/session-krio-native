server:
  port: 8081
  servlet:
    session:
      cookie:
        name: SHAREDSESSION
        path: /
        same-site: lax

spring:
  application:
    name: native-app
  data:
    redis:
      host: localhost
      port: 6379
  session:
    redis:
      namespace: spring:session:kryo-native-poc
    timeout: 30m
